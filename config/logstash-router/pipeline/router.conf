# CPM router pipeline
# Reads events from the "test-dataset" Kafka topic and routes each event to the
# topic <data_stream.type>-<data_stream.dataset>-<data_stream.namespace>.
# If that topic does not exist (not in the valid_topics dictionary), or the
# data_stream fields are missing, the event is sent to the "dead-letter-queue"
# topic instead.

input {
  kafka {
    bootstrap_servers => "kafka:9092,kafka2:9092,kafka3:9092"
    topics => ["test-dataset"]
    group_id => "cpm-router"
    client_id => "cpm-router"
    auto_offset_reset => "earliest"
    codec => json
  }
}

filter {
  # Build the target topic from the data_stream fields.
  if [data_stream][type] and [data_stream][dataset] and [data_stream][namespace] {
    mutate {
      add_field => {
        "[@metadata][target_topic]" => "%{[data_stream][type]}-%{[data_stream][dataset]}-%{[data_stream][namespace]}"
      }
    }
  } else {
    mutate { add_field => { "[@metadata][target_topic]" => "__missing_data_stream__" } }
  }

  # Look the target topic up in the dictionary of existing Kafka topics.
  # Found -> "yes"; not found -> fallback "no". Refreshed every 60s so newly
  # created topics are picked up without a restart.
  translate {
    source => "[@metadata][target_topic]"
    target => "[@metadata][topic_known]"
    dictionary_path => "/usr/share/logstash/config/valid_topics.yml"
    fallback => "no"
    refresh_interval => 60
  }

  # Annotate events that will be dead-lettered so the DLQ message is useful.
  if [@metadata][topic_known] != "yes" {
    mutate {
      add_field => {
        "[dlq][intended_topic]" => "%{[@metadata][target_topic]}"
        "[dlq][reason]" => "target topic does not exist"
        "[dlq][routed_at]" => "%{@timestamp}"
      }
    }
  }
}

output {
  if [@metadata][topic_known] == "yes" {
    kafka {
      bootstrap_servers => "kafka:9092,kafka2:9092,kafka3:9092"
      topic_id => "%{[@metadata][target_topic]}"
      codec => json
    }
  } else {
    kafka {
      bootstrap_servers => "kafka:9092,kafka2:9092,kafka3:9092"
      topic_id => "dead-letter-queue"
      codec => json
    }
  }
}
