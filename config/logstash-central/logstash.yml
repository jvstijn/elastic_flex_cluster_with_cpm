api.http.host: "0.0.0.0"

xpack.monitoring.enabled: true
xpack.monitoring.elasticsearch.hosts: ["https://es-central:9200"]
xpack.monitoring.elasticsearch.username: "elastic"
xpack.monitoring.elasticsearch.password: "${ELASTIC_PASSWORD}"
xpack.monitoring.elasticsearch.ssl.verification_mode: none

# CPM central pipeline management lives on es-central. This Logstash only runs
# the pipelines for the central cluster (pipeline ids "central_cpm-*", where the
# "central" prefix comes from node.attr.dc=central via cpm-cluster-registry).
xpack.management.enabled: true
xpack.management.elasticsearch.hosts: ["https://es-central:9200"]
xpack.management.elasticsearch.username: "elastic"
xpack.management.elasticsearch.password: "${ELASTIC_PASSWORD}"
xpack.management.elasticsearch.ssl.verification_mode: none
xpack.management.pipeline.id: ["central_*"]

path.logs: /usr/share/logstash/logs
