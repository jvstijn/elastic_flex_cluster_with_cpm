# Docker / local test: extract from localhost:9200 using API key from cpm_settings.json.
# Usage:
#   ansible-playbook -i inventory.extract.docker.ini extract_watches.yml

[cpm]
localhost ansible_connection=local

[cpm:vars]
extract_watches_elastic_url=https://localhost:9200
extract_watches_auth_method=api_key
extract_watches_validate_certs=false
