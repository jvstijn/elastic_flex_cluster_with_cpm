---
- include_vars: ../defaults/required_vars.yml

- name: Install CPM on central Elasticsearch
  block:
    - name: Probe Stack Monitoring field paths
      ansible.builtin.include_tasks: monitoring_fields.yml
      tags: [probe, always]

    - name: Create config indices
      ansible.builtin.include_tasks: indices.yml
      tags: [indices]

    - name: Install ML jobs and datafeeds
      ansible.builtin.include_tasks: ml.yml
      tags: [ml]

    - name: Install ingest pipeline and transform
      ansible.builtin.include_tasks: ingest_transform.yml
      tags: [transform]

    - name: Create watcher webhook API key
      ansible.builtin.include_tasks: watcher_api_key.yml
      tags: [watchers]

    - name: Deploy watchers
      ansible.builtin.include_tasks: watchers.yml
      tags: [watchers]

    - name: Seed templates and routing defaults
      ansible.builtin.include_tasks: seed_data.yml
      tags: [seed]

    - name: Patch cluster registry from inventory
      ansible.builtin.include_tasks: registry_patch.yml
      tags: [registry]

    - name: Deploy Kibana dashboards
      ansible.builtin.include_tasks: dashboard.yml
      tags: [dashboard]

    - name: Verify CPM installation
      ansible.builtin.include_tasks: verify.yml
      tags: [verify, never]

  run_once: true
