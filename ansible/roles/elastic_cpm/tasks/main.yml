    #      loop:
    #        - { id: "cpm-store-size", file: "json/ml_anomaly_detectors_cpm-store-size.json" }
    #        - { id: "cpm-jvm-heap", file: "json/ml_anomaly_detectors_cpm-jvm-heap.json" }
    #        - { id: "cpm-shard-count", file: "json/ml_anomaly_detectors_cpm-shard-count.json" }
    #        - { id: "cpm-cluster-event-rate", file: "json/ml_anomaly_detectors_cpm-cluster-event-rate.json" }
    #        - { id: "cpm-event-rate", file: "json/ml_anomaly_detectors_cpm-event-rate.json" }
    #    
    #    - name: Create CPM ML datafeeds
    #      ansible.builtin.uri:
    #        url: "{{ elastic_base_url }}/_ml/datafeeds/{{ item.id }}"
    #        method: PUT
    #        user: "{{ elastic_usr }}"
