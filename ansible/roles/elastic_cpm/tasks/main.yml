---
- include_vars: ../defaults/required_vars.yml

# Het onderstaande blok zorgt ervoor dat alle benodigde componenten in Elastic worden geinstalleerd
- name: Blok om setup central pipeline management
  #tags: never
  block:
    - name: Create CPM indices
      ansible.builtin.uri:
        url: "{{ elastic_base_url }}/{{ item.name }}"
        method: PUT
        user: "{{ elastic_usr }}"
        password: "{{ elastic_pw }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body: "{{ lookup('file', item.file) }}"
        status_code: [200, 201, 400]
      loop:
        - { name: "cpm-cluster-registry", file: "json/index_cpm-cluster-registry.json" }
        - { name: "cpm-scores", file: "json/index_cpm-scores.json" }
    
    - name: Check if CPM ML anomaly detectors exist
      ansible.builtin.uri:
        url: "{{ elastic_base_url }}/_ml/anomaly_detectors/{{ item.id }}"
        method: GET
        user: "{{ elastic_usr }}"
        password: "{{ elastic_pw }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 404]
      loop: "{{ cpm_ml_detectors }}"
      loop_control:
        label: "{{ item.id }}"
      register: cpm_anomaly_detectors_check
    
    - name: Create CPM ML anomaly detectors (alleen als ze nog niet bestaan)
      ansible.builtin.uri:
        url: "{{ elastic_base_url }}/_ml/anomaly_detectors/{{ item.item.id }}"
        method: PUT
        user: "{{ elastic_usr }}"
        password: "{{ elastic_pw }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body: "{{ lookup('file', item.item.file) }}"
        status_code: [200, 201]
      loop: "{{ cpm_anomaly_detectors_check.results }}"
      when: item.status == 404
      loop_control:
        label: "{{ item.item.id }}"

    #    - name: Create CPM ML anomaly detectors
    #      ansible.builtin.uri:
    #        url: "{{ elastic_base_url }}/_ml/anomaly_detectors/{{ item.id }}"
    #        method: PUT
    #        user: "{{ elastic_usr }}"
    #        password: "{{ elastic_pw }}"
