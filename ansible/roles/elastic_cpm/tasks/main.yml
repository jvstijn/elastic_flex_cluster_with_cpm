    #        status_code: [200, 201, 400]
    #      loop:
    #        - { id: "datafeed-cpm-store-size", file: "json/ml_datafeed_cpm-store-size.json" }
    #        - { id: "datafeed-cpm-jvm-heap", file: "json/ml_datafeed_cpm-jvm-heap.json" }
    #        - { id: "datafeed-cpm-shard-count", file: "json/ml_datafeed_cpm-shard-count.json" }
