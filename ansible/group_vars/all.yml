---
# ===========================================================================
# Variables for elastic_cpm role.
# Values are read from the project .env where possible.
# ===========================================================================

elastic_usr: elastic
elastic_pw: "{{ lookup('ini', 'ELASTIC_PASSWORD type=properties file=' ~ playbook_dir ~ '/../.env') }}"
es_central_port: "{{ lookup('ini', 'ES_CENTRAL_PORT type=properties file=' ~ playbook_dir ~ '/../.env') }}"
elastic_base_url: "https://localhost:{{ es_central_port }}"

# Watchers run inside es-central and call ES via docker network alias
webhook_host: es-central

cpm_monitoring_index: ".monitoring-es-8-*"
cpm_ml_reinstall: false
cpm_clean_indices: false
cpm_datafeed_start: ""

# Patch registry after install/bootstrap (cluster_name keys)
cpm_cluster_registry:
  central-cluster:
    ingest_hosts: "https://es-central:9200"
    dc: "dc-central"
  remote-a:
    ingest_hosts: "https://es-remote-a:9200"
    dc: "dc-a"
  remote-b:
    ingest_hosts: "https://es-remote-b:9200"
    dc: "dc-b"

